upstream auth_service    { server auth_service:8001; }
upstream product_service { server product_service:8002; }
upstream cart_service    { server cart_service:8003; }
upstream order_service   { server order_service:8004; }

server {
    listen 8000;
    server_name _;

    client_max_body_size 20M;

    # ── Public API routes ─────────────────────────────────────────────────────
    location /api/v1/auth/ {
        proxy_pass         http://auth_service/api/v1/auth/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/products/ {
        proxy_pass         http://product_service/api/v1/products/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/cart/ {
        proxy_pass         http://cart_service/api/v1/cart/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/v1/orders/ {
        proxy_pass         http://order_service/api/v1/orders/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Root: API info page ───────────────────────────────────────────────────
    location = / {
        default_type application/json;
        return 200 '{"service":"EShop API Gateway","version":"1.0","endpoints":["/api/v1/auth/","/api/v1/products/","/api/v1/cart/","/api/v1/orders/"]}';
    }

    # ── Block direct access to internal endpoints from outside ────────────────
    location /internal/ {
        return 403;
    }

    # ── Admin panels (direct access via service ports) ────────────────────────
    # Auth admin   → http://localhost:8001/admin/
    # Product admin → http://localhost:8002/admin/
    # Cart admin   → http://localhost:8003/admin/
    # Order admin  → http://localhost:8004/admin/
}
