version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# EShop — Microservices Stack
#
#  gateway         → nginx:8000  (public entry point)
#  auth_service    → Django:8001 + auth_db
#  product_service → Django:8002 + product_db
#  cart_service    → Django:8003 + cart_db
#  order_service   → Django:8004 + order_db + celery worker
#  redis           → shared message broker
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-supersecret-change-in-production}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-internal-svc-token}
  AUTH_SERVICE_URL: http://auth_service:8001
  PRODUCT_SERVICE_URL: http://product_service:8002
  CART_SERVICE_URL: http://cart_service:8003
  ORDER_SERVICE_URL: http://order_service:8004
  REDIS_URL: redis://redis:6379/0

networks:
  ecommerce_net:
    driver: bridge

volumes:
  auth_db_data:
  product_db_data:
  cart_db_data:
  order_db_data:
  media_volume:

services:

  # ── Nginx API Gateway ────────────────────────────────────────────────────────
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8000:8000"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth_service
      - product_service
      - cart_service
      - order_service
    restart: on-failure
    networks:
      - ecommerce_net

  # ── Auth Service ─────────────────────────────────────────────────────────────
  auth_service:
    build: ./services/auth_service
    command: >
      sh -c "python manage.py makemigrations accounts &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    environment:
      <<: *common-env
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: auth_db
      DB_PORT: 5432
    ports:
      - "8001:8001"
    volumes:
      - ./services/auth_service:/app
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
      - ecommerce_net

  auth_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - ecommerce_net

  # ── Product Service ───────────────────────────────────────────────────────────
  product_service:
    build: ./services/product_service
    command: >
      sh -c "python manage.py makemigrations products &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    environment:
      <<: *common-env
      DB_NAME: product_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: product_db
      DB_PORT: 5432
    ports:
      - "8002:8002"
    volumes:
      - ./services/product_service:/app
      - media_volume:/app/media
    depends_on:
      product_db:
        condition: service_healthy
    networks:
      - ecommerce_net

  product_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - ecommerce_net

  # ── Cart Service ──────────────────────────────────────────────────────────────
  cart_service:
    build: ./services/cart_service
    command: >
      sh -c "python manage.py makemigrations cart &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8003"
    environment:
      <<: *common-env
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: cart_db
      DB_PORT: 5432
    ports:
      - "8003:8003"
    volumes:
      - ./services/cart_service:/app
    depends_on:
      cart_db:
        condition: service_healthy
    networks:
      - ecommerce_net

  cart_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - cart_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - ecommerce_net

  # ── Order Service ─────────────────────────────────────────────────────────────
  order_service:
    build: ./services/order_service
    command: >
      sh -c "python manage.py makemigrations orders &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8004"
    environment:
      <<: *common-env
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: order_db
      DB_PORT: 5432
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@ecommerce.local
    ports:
      - "8004:8004"
    volumes:
      - ./services/order_service:/app
    depends_on:
      order_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce_net

  order_celery:
    build: ./services/order_service
    command: celery -A config worker -l info -c 4
    environment:
      <<: *common-env
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: order_db
      DB_PORT: 5432
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@ecommerce.local
    volumes:
      - ./services/order_service:/app
    depends_on:
      order_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce_net

  order_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
    networks:
      - ecommerce_net

  # ── Redis (shared broker) ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - ecommerce_net
